<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有文章 - 太皮</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">太皮</a>
            <ul class="nav-links" id="nav-links">
                <li>加载中...</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="content-section">
            <div class="section">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="搜索文章..." class="search-input">
                    <button id="search-button" class="search-button">搜索</button>
                </div>
                <div class="articles-list" id="articles-list">
                    <div style="text-align: center; padding: 2rem; color: #64748b;">
                        加载文章中...
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 太皮. 保留所有权利.</p>
    </footer>
    <script src="../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadNavigation();
            loadArticles();
        });

        // 加载文章列表
        async function loadArticles(searchTerm = '') {
            const articlesList = document.getElementById('articles-list');
            
            try {
                // 文章文件列表
                const articleFiles = [
                    'index.md',
                    'hello.md',
                    'win.md',
                    'micrsoft.md',
                    'install.md',
                    'two.md'
                ];

                const articles = [];

                // 加载并解析每个文章文件
                for (const file of articleFiles) {
                    const response = await fetch(`../docs/article/${file}`);
                    if (!response.ok) {
                        console.log(`加载失败: ${file}`);
                        continue;
                    }

                    const content = await response.text();
                    console.log(`加载文件: ${file}`);
                    console.log(`文件内容: ${content.substring(0, 100)}...`);
                    
                    const article = parseArticle(content, file);
                    console.log(`解析结果:`, article);
                    
                    if (article) {
                        articles.push(article);
                    }
                }
                
                console.log(`所有文章:`, articles);

                // 按日期排序（最新的在前）
                articles.sort((a, b) => new Date(b.date) - new Date(a.date));

                // 根据搜索条件过滤文章
                const filteredArticles = articles.filter(article => {
                    if (!searchTerm) return true;
                    const searchLower = searchTerm.toLowerCase();
                    return (
                        article.title.toLowerCase().includes(searchLower) ||
                        article.excerpt.toLowerCase().includes(searchLower) ||
                        article.tags.some(tag => tag.toLowerCase().includes(searchLower)) ||
                        article.authors.toLowerCase().includes(searchLower)
                    );
                });

                // 生成文章列表HTML
                renderArticles(filteredArticles);

                // 绑定搜索功能
                bindSearchEvents();

            } catch (error) {
                articlesList.innerHTML = `<div style="text-align: center; padding: 2rem; color: #ef4444;">加载失败: ${error.message}</div>`;
            }
        }

        // 解析文章内容
        function parseArticle(content, filename) {
            // 解析YAML front matter
            const frontMatterMatch = content.match(/^---[\s\S]*?---/m);
            let frontMatter = {};
            let bodyContent = content;

            if (frontMatterMatch) {
                const frontMatterText = frontMatterMatch[0].replace(/^---|---$/g, '').trim();
                bodyContent = content.replace(frontMatterMatch[0], '').trim();

                // 简单解析YAML，处理Windows换行符
                frontMatterText.split(/\r?\n/).forEach(line => {
                    line = line.trim();
                    if (line) {
                        const colonIndex = line.indexOf(':');
                        if (colonIndex > 0) {
                            const key = line.substring(0, colonIndex).trim();
                            const value = line.substring(colonIndex + 1).trim().replace(/^"|"$/g, '');
                            frontMatter[key] = value;
                        }
                    }
                });
            }

            // 提取标题（如果front matter中没有，从内容中提取）
            let title = frontMatter.title;
            if (!title) {
                const titleMatch = bodyContent.match(/^#\s+(.+)$/m);
                title = titleMatch ? titleMatch[1] : `文章 ${filename}`;
            }

            // 提取摘要（前150个字符）
            const plainText = bodyContent.replace(/#+\s+/g, '').replace(/\r?\n/g, ' ').replace(/\s+/g, ' ');
            const excerpt = plainText.substring(0, 150) + (plainText.length > 150 ? '...' : '');

            // 构建文章对象
            return {
                title: title,
                date: frontMatter.date || '2026-04-18',
                category: frontMatter.category || 'tech',
                tags: frontMatter.tags ? frontMatter.tags.split(',').map(tag => tag.trim()) : [],
                summary: frontMatter.summary || excerpt,
                excerpt: frontMatter.summary || excerpt,
                authors: frontMatter.authors || '',
                filename: filename
            };
        }

        // 渲染文章列表
        function renderArticles(articles) {
            const articlesList = document.getElementById('articles-list');
            
            if (articles.length === 0) {
                articlesList.innerHTML = `<div style="text-align: center; padding: 2rem; color: #64748b;">暂无文章</div>`;
                return;
            }

            let html = '';
            articles.forEach(article => {
                const categoryClass = article.category;
                const categoryText = {
                    'tutorial': '教程',
                    'life': '生活',
                    'tech': '技术'
                }[article.category] || '技术';

                html += `
                    <div class="article-item">
                        <div class="article-meta">
                            ${article.authors ? `<span class="article-authors">${article.authors}</span>` : ''}
                        </div>
                        <h3 class="article-title"><a href="detail.html?file=${article.filename}">${article.title}</a></h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                        <div class="article-tags">
                            ${article.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            <span class="article-date">${article.date}</span>
                        </div>
                    </div>
                `;
            });

            articlesList.innerHTML = html;
        }

        // 绑定搜索事件
        function bindSearchEvents() {
            const searchInput = document.getElementById('search-input');
            const searchButton = document.getElementById('search-button');
            
            // 搜索按钮点击事件
            searchButton.addEventListener('click', () => {
                const searchTerm = searchInput.value.trim();
                loadArticles(searchTerm);
            });
            
            // 回车键搜索
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const searchTerm = searchInput.value.trim();
                    loadArticles(searchTerm);
                }
            });
        }
    </script>
</body>
</html>
