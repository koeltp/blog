<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/logo/logo.png">
    <title>页面未找到 - 太皮</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .not-found {
            text-align: center;
            padding: 8rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .not-found-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .not-found h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin: 1rem 0;
        }
        .not-found p {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .not-found a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .not-found a:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><img src="img/logo/logo.png" alt="太皮"></a>
            <ul class="nav-links" id="nav-links">
                <li>加载中...</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="not-found">
            <div class="not-found-code">404</div>
            <h1>页面未找到</h1>
            <p>你访问的页面不存在，可能已被移动或删除。</p>
            <a href="index.html">返回首页</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 太皮. 保留所有权利.</p>
    </footer>
    <script src="js/common.js"></script>
</body>
</html>
